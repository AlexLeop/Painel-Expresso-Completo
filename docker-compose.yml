version: '3.8'
services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  django:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      bash -c "python manage.py migrate &&
               python manage.py warmup_denylist &&
               python manage.py collectstatic --noinput &&
               gunicorn --bind 0.0.0.0:8000 --workers 3 config.wsgi:application"
    volumes:
      - static_volume:/app/static
    environment:
      # Geral e Supabase
      - SUPABASE_URL=${SUPABASE_URL:-https://xxxx.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-sua-chave-anon}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:senha@pooler.supabase.com:6543/postgres?pgbouncer=true}
      - DIRECT_URL=${DIRECT_URL:-postgresql://postgres:senha@pooler.supabase.com:5432/postgres}
      
      # Backend (Django & Celery)
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-sua-chave-secreta-aqui}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-seu-dominio.com,localhost}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://seu-dominio.com,http://localhost:5173}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-True}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      
      # Integrações e IA
      - GEMINI_API_KEY=${GEMINI_API_KEY:-sua-chave-gemini}
      - GOOGLE_MAPS_PLATFORM_KEY=${GOOGLE_MAPS_PLATFORM_KEY:-sua-chave-maps}
      
      # Evolution API
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-https://evo.seu-dominio.com}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-sua-global-api-key}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-sua-instancia}
      - EVOLUTION_INSTANCE_TOKEN=${EVOLUTION_INSTANCE_TOKEN:-seu-token-de-instancia}
      
      # Mobile (NevesGo)
      - NEVESGO_API_BASE_URL=${NEVESGO_API_BASE_URL:-https://api.seu-dominio.com/api/v1/}
    depends_on:
      - redis

  fastapi:
    build:
      context: .
      dockerfile: fast_lane/Dockerfile
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-https://xxxx.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-sua-chave-anon}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      # A FastAPI pode precisar das integrações se tiver endpoints que as usem
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:senha@pooler.supabase.com:6543/postgres?pgbouncer=true}
      - DIRECT_URL=${DIRECT_URL:-postgresql://postgres:senha@pooler.supabase.com:5432/postgres}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-sua-chave-gemini}
    depends_on:
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config worker -l info --concurrency=2
    environment:
      # Copia do Django para os tasks do Celery terem acesso a tudo
      - SUPABASE_URL=${SUPABASE_URL:-https://xxxx.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-sua-chave-anon}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:senha@pooler.supabase.com:6543/postgres?pgbouncer=true}
      - DIRECT_URL=${DIRECT_URL:-postgresql://postgres:senha@pooler.supabase.com:5432/postgres}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-sua-chave-secreta-aqui}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-seu-dominio.com,localhost}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://seu-dominio.com,http://localhost:5173}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-True}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-sua-chave-gemini}
      - GOOGLE_MAPS_PLATFORM_KEY=${GOOGLE_MAPS_PLATFORM_KEY:-sua-chave-maps}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-https://evo.seu-dominio.com}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-sua-global-api-key}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-sua-instancia}
      - EVOLUTION_INSTANCE_TOKEN=${EVOLUTION_INSTANCE_TOKEN:-seu-token-de-instancia}
      - NEVESGO_API_BASE_URL=${NEVESGO_API_BASE_URL:-https://api.seu-dominio.com/api/v1/}
    depends_on:
      - django
      - redis

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config beat -l info
    environment:
      # Idem ao worker
      - SUPABASE_URL=${SUPABASE_URL:-https://xxxx.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-sua-chave-anon}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:senha@pooler.supabase.com:6543/postgres?pgbouncer=true}
      - DIRECT_URL=${DIRECT_URL:-postgresql://postgres:senha@pooler.supabase.com:5432/postgres}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-sua-chave-secreta-aqui}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-seu-dominio.com,localhost}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://seu-dominio.com,http://localhost:5173}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-True}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-sua-chave-gemini}
      - GOOGLE_MAPS_PLATFORM_KEY=${GOOGLE_MAPS_PLATFORM_KEY:-sua-chave-maps}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-https://evo.seu-dominio.com}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-sua-global-api-key}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-sua-instancia}
      - EVOLUTION_INSTANCE_TOKEN=${EVOLUTION_INSTANCE_TOKEN:-seu-token-de-instancia}
      - NEVESGO_API_BASE_URL=${NEVESGO_API_BASE_URL:-https://api.seu-dominio.com/api/v1/}
    depends_on:
      - django
      - redis

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static
    depends_on:
      - django
      - fastapi
      - frontend

  frontend:
    build:
      context: ./Novo_FrontEnd
      dockerfile: Dockerfile
    environment:
      # Frontend (Vite/React)
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-https://xxxx.supabase.co}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-eyJh...}
      - VITE_API_URL=${VITE_API_URL:-https://api.seu-dominio.com}
      - PORT=${PORT:-5173}
      - NODE_ENV=${NODE_ENV:-production}
    expose:
      - "5173"
    depends_on:
      - django

volumes:
  redis_data:
  static_volume:
