name: Mobile CI

on:
  push:
    branches: [ main ]
    paths:
      - 'nevesgo/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'nevesgo/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nevesgo

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and assemble release
        run: gradle assembleRelease
