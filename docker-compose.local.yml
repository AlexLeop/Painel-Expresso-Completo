version: '3.8'

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  django:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      bash -c "python manage.py migrate &&
               python manage.py warmup_denylist &&
               gunicorn --bind 0.0.0.0:8000 --workers 3 config.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/static
    environment:
      - DJANGO_DEBUG=False
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - redis

  fastapi:
    build:
      context: .
      dockerfile: fast_lane/Dockerfile
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - django
      - redis

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config beat -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - django
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static
    depends_on:
      - django
      - fastapi
      - frontend

  frontend:
    build:
      context: ./Novo_FrontEnd
      dockerfile: Dockerfile
    volumes:
      - ./Novo_FrontEnd:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
    depends_on:
      - django

volumes:
  redis_data:
  static_volume:
